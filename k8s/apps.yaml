apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
data:
  REDIS_URL: "redis://redis:6379"
  DATABASE_URL: "postgresql+asyncpg://postgres:postgres@db:5432/agentdb"
  MCP_SERVER_URL: "http://mcp-server:8001/sse"
  MINIO_URL: "minio:9000"
---
apiVersion: v1
kind: Service
metadata:
  name: mcp-server
spec:
  ports:
    - port: 8001
  selector:
    app: mcp-server
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mcp-server
  template:
    metadata:
      labels:
        app: mcp-server
    spec:
      containers:
        - name: mcp-server
          image: dmaf-mcp-server:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: app-config
          ports:
            - containerPort: 8001
---
apiVersion: v1
kind: Service
metadata:
  name: api
spec:
  type: NodePort
  ports:
    - port: 8000
      targetPort: 8000
  selector:
    app: api
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: dmaf-api:latest
          imagePullPolicy: IfNotPresent
          command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
          envFrom:
            - configMapRef:
                name: app-config
          ports:
            - containerPort: 8000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: orchestrator-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: orchestrator-worker
  template:
    metadata:
      labels:
        app: orchestrator-worker
    spec:
      containers:
        - name: orchestrator-worker
          image: dmaf-orchestrator-worker:latest
          imagePullPolicy: IfNotPresent
          command: ["python", "-m", "app.workers.orchestrator_worker"]
          envFrom:
            - configMapRef:
                name: app-config
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agent-worker
  template:
    metadata:
      labels:
        app: agent-worker
    spec:
      containers:
        - name: agent-worker
          image: dmaf-agent-worker:latest
          imagePullPolicy: IfNotPresent
          command: ["python", "-m", "app.workers.agent_worker"]
          envFrom:
            - configMapRef:
                name: app-config
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
spec:
  type: NodePort
  ports:
    - port: 5173
      targetPort: 5173
  selector:
    app: frontend
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: dmaf-frontend:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: VITE_API_URL
              value: "http://api:8000"
          ports:
            - containerPort: 5173
