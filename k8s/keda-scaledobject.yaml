apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: agent-worker-scaler
  namespace: default
spec:
  scaleTargetRef:
    name: agent-worker
  pollingInterval: 5
  cooldownPeriod: 30
  minReplicaCount: 0
  maxReplicaCount: 10
  triggers:
    - type: redis
      metadata:
        address: redis:6379
        stream: worker_tasks
        consumerGroup: worker_group
        pendingEntriesCount: "1"
